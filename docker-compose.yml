services:
  # Backend Service (Go)
  backend:
    build:
      context: .
      dockerfile: build/Dockerfile
      target: production
    container_name: mailraven-backend
    restart: unless-stopped
    ports:
      - "25:25"      # SMTP
      - "8080:8080"  # API
    volumes:
      - ./data:/data
      - ./config.yaml:/etc/mailraven/config.yaml
    environment:
      - MAILRAVEN_STORAGE_DRIVER=postgres
      - MAILRAVEN_STORAGE_DSN=postgres://${POSTGRES_USER:-mailraven}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mailraven}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: mailraven-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mailraven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mailraven}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailraven}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Frontend Service (Nginx serving React)
  frontend:
    build:
      context: .
      dockerfile: build/Dockerfile.frontend
    container_name: mailraven-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Spam Filter (Rspamd)
  rspamd:
    image: rspamd/rspamd:3.8
    container_name: mailraven-rspamd
    restart: unless-stopped
    ports:
      - "127.0.0.1:11333:11333" # WebUI bound to localhost only
    volumes:
      - rspamd_data:/var/lib/rspamd
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

volumes:
  postgres_data:
  rspamd_data:
