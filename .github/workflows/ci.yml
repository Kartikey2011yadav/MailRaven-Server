name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend-unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Create Dummy Frontend Assets
      run: |
        mkdir -p internal/adapters/http/static/dist
        touch internal/adapters/http/static/dist/.gitkeep

    - name: Verify dependencies
      run: go mod verify

    - name: Run Backend Linter (golangci-lint)
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m

    - name: Run Unit Tests
      run: go test -race -v ./internal/... ./cmd/...

    - name: Build
      run: go build -v ./...

  test-backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mailraven
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: mailraven_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Enable Swap
      run: |
        sudo swapoff /swapfile || true
        sudo rm -f /swapfile
        sudo fallocate -l 2G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Create Dummy Frontend Assets
      run: |
        mkdir -p internal/adapters/http/static/dist
        touch internal/adapters/http/static/dist/.gitkeep

    - name: Run Integration Tests
      run: go test -v -p 1 ./tests/...
      env:
        MAILRAVEN_STORAGE_DSN: postgres://mailraven:testpass@localhost:5432/mailraven_test?sslmode=disable

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      working-directory: ./client
      run: npm ci

    - name: TypeScript Type Check
      working-directory: ./client
      run: npx tsc -b

    - name: Run Lint
      working-directory: ./client
      run: npm run lint

    - name: Build
      working-directory: ./client
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend-unit, test-backend-integration, test-frontend]
    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Backend Image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: build/Dockerfile
        push: false
        tags: mailraven/backend:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Frontend Image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: build/Dockerfile.frontend
        push: false
        tags: mailraven/frontend:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max
