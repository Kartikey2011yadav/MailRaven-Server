apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mailraven-scaler
  namespace: mailraven
spec:
  scaleTargetRef:
    name: mailraven-backend
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 300 # 5 minutes before scaling to zero
  pollingInterval: 15
  triggers:
  # Scale up when there are active SMTP connections
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.monitoring:9090
      metricName: mailraven_active_smtp_connections
      threshold: "1"
      query: sum(mailraven_active_smtp_connections)
  # Scale up when queue has pending messages
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.monitoring:9090
      metricName: mailraven_queue_depth
      threshold: "5"
      query: sum(mailraven_queue_depth)
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mailraven-http-scaler
  namespace: mailraven
spec:
  scaleTargetRef:
    name: mailraven-backend
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 300
  triggers:
  # Scale based on HTTP request rate
  - type: prometheus
    metadata:
      serverAddress: http://prometheus.monitoring:9090
      metricName: mailraven_http_requests_total
      threshold: "100"
      query: sum(rate(mailraven_http_requests_total[1m]))
