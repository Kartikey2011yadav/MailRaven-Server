# MailRaven Configuration Example
# Copy this file to /etc/mailraven/config.yaml and customize for your deployment

# Deployment mode: standalone, docker, kubernetes
# - standalone: in-memory cache, local filesystem, PostgreSQL (default)
# - docker: connects to Redis, NATS, MinIO, PostgreSQL containers
# - kubernetes: same as docker + optimized for K8s probes and scaling
mode: standalone

# Domain name for email server (must match your DNS records)
domain: mail.example.com

# SMTP server configuration
smtp:
  # Port for SMTP server (25 for production, 2525 for development)
  port: 25
  
  # Hostname presented in SMTP banner
  hostname: mail.example.com
  
  # Maximum message size in bytes (25 MB)
  max_size: 26214400

  # DANE verification for outbound mail
  dane:
    # Mode: "off", "advisory" (log only), "enforce" (fail delivery on mismatch)
    mode: advisory

# API server configuration (for mobile/web clients)
api:
  # Host to bind API server (0.0.0.0 for all interfaces, 127.0.0.1 for localhost only)
  host: 0.0.0.0
  
  # Port for API server (8443 for HTTPS, 8080 for HTTP)
  port: 8443
  
  # Enable TLS for API endpoints
  tls: true
  
  # Path to API TLS certificate (can be same as SMTP cert)
  tls_cert: /etc/mailraven/certs/tls.crt
  
  # Path to API TLS key (can be same as SMTP key)
  tls_key: /etc/mailraven/certs/tls.key
  
  # JWT secret for authentication tokens (generate with: openssl rand -base64 32)
  # IMPORTANT: Change this to a random secret in production!
  jwt_secret: "CHANGE-THIS-TO-RANDOM-SECRET-IN-PRODUCTION"

# Production Hardening Settings (v2)

# Global TLS Configuration (overrides SMTP/API specific certs if ACME enabled)
tls:
  enabled: true
  acme:
    enabled: false # Set to true to use Let's Encrypt
    email: "admin@example.com"
    domains: ["mail.example.com"]
    cache_dir: "/data/certs"

# Spam Protection
spam:
  enabled: true
  rspamd_url: "http://localhost:11333" # URL to Rspamd interface
  reject_score: 15.0      # Score > 15 = 5xx Reject
  header_score: 6.0       # Score > 6 = Add X-Spam Headers
  dnsbls:
    - "zen.spamhaus.org"
    - "bl.spamcop.net"
  max_recipients: 50
  rate_limit:
    window: "1h"
    count: 100

# IMAP Server Configuration
imap:
  enabled: true
  port: 143              # Standard IMAP port (STARTTLS)
  port_tls: 993          # Implicit TLS port
  allow_insecure_auth: false # Require TLS for LOGIN
  tls_cert: /etc/mailraven/certs/tls.crt
  tls_key: /etc/mailraven/certs/tls.key

# Automated Backups
backup:
  location: "/data/backups"
  retention_days: 7

# Storage configuration
storage:
  # Database driver: "postgres" (default, recommended) or "sqlite"
  driver: postgres

  # PostgreSQL connection string (required for postgres driver)
  dsn: "postgres://mailraven:yourpassword@localhost:5432/mailraven?sslmode=disable"

  # SQLite database path (only used if driver=sqlite)
  # db_path: /var/lib/mailraven/mailraven.db

  # Path to blob storage directory (for message bodies)
  blob_path: /var/lib/mailraven/blobs

# DKIM signing configuration
dkim:
  # Domain for DKIM signatures (usually same as main domain)
  domain: example.com
  
  # DKIM selector (appears in DNS: selector._domainkey.domain)
  selector: default
  
  # Path to DKIM private key (generated by quickstart)
  private_key_path: /etc/mailraven/dkim/private.key

# Logging configuration
logging:
  # Log level: debug, info, warn, error
  level: info
  
  # Log format: json, text
  format: json
  
  # Log output: stdout, file
  output: stdout
  
  # Log file path (if output is 'file')
  file_path: /var/log/mailraven/mailraven.log

# Security & validation settings
security:
  # Require SPF pass for incoming mail
  require_spf: false
  
  # Require DKIM pass for incoming mail
  require_dkim: false
  
  # Require DMARC pass for incoming mail
  require_dmarc: false
  
  # Enable rate limiting (per IP)
  rate_limit:
    enabled: true
    requests_per_minute: 100

# ManageSieve (for mail filtering rules via standard clients)
managesieve:
  enabled: true
  port: 4190

# --- Distributed Infrastructure (for docker/kubernetes modes) ---

# Redis: distributed caching, rate limiting, pub/sub notifications
# Enable when running multiple backend instances
redis:
  enabled: false
  addr: "redis:6379"
  password: ""
  db: 0

# NATS: message broker for async task distribution
# Enables competing consumers for delivery, spam training, indexing
nats:
  enabled: false
  url: "nats://nats:4222"

# Object Store: blob storage backend
# "disk" = local filesystem (default), "minio" = S3-compatible storage
object_store:
  driver: "disk"
  # MinIO settings (only used when driver=minio):
  # endpoint: "minio:9000"
  # bucket: "mailraven-blobs"
  # access_key: "minioadmin"
  # secret_key: "minioadmin"
  # use_ssl: false

