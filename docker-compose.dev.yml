services:
  backend:
    build:
      context: .
      dockerfile: build/Dockerfile
      target: builder
    container_name: mailraven-backend-dev
    volumes:
      - .:/app
      - ./data-dev:/data
      - ./config.yaml:/etc/mailraven/config.yaml
    environment:
      - MAILRAVEN_STORAGE_DRIVER=postgres
      - MAILRAVEN_STORAGE_DSN=postgres://${POSTGRES_USER:-mailraven}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-mailraven}?sslmode=disable
    command: ["go", "run", "./cmd/mailraven/", "serve", "--config", "/etc/mailraven/config.yaml"]
    ports:
      - "2525:25"
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: build/Dockerfile.frontend
      target: builder
    container_name: mailraven-frontend-dev
    volumes:
      - ./client:/app
      - /app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host"]
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080

  db:
    image: postgres:15-alpine
    container_name: mailraven-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mailraven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-mailraven}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailraven}"]
      interval: 5s
      timeout: 5s
      retries: 5
